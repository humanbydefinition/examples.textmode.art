name: deploy

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
        steps:
            - name: Guard production deploy branch
              if: github.ref != 'refs/heads/main'
              run: |
                  echo "This workflow only deploys from the main branch." >&2
                  echo "Re-run it from Actions and choose the main branch." >&2
                  exit 1
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci --ignore-scripts # skip postinstall auto-sync; sync:ci is the strict gate
            - run: npm run sync:ci
            - run: npm run build # build includes typecheck via CI gate on PRs
            - uses: actions/configure-pages@v6
            - uses: actions/upload-pages-artifact@v5
              with:
                  path: dist/

    deploy:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v5
