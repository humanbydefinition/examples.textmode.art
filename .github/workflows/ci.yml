name: CI

on:
    pull_request:
        branches: [dev, beta, main]
    push:
        branches: [dev, beta, main]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest
        env:
            HUSKY: '0'
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci --ignore-scripts
            - run: npm run check
